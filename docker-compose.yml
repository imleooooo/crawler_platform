services:
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend-api

  backend-api:
    build: ./backend-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend-api:/app
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_KEY=${API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_CX=${GOOGLE_CX}
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
      - RUSTFS_ENDPOINT=http://rustfs:9000
      - RUSTFS_PUBLIC_ENDPOINT=${RUSTFS_PUBLIC_ENDPOINT}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rustfs:
    build: ./rustfs
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data/rustfs0
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}

volumes:
  rustfs_data:
  redis_data:
