[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.1

[licenses.private]
ignore = true

[advisories]
ignore = [
    { id = "RUSTSEC-2026-0002", reason = "Unsoundness in lru crate used by aws-sdk-s3. Upstream update pending." },
]
